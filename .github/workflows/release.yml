name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.0.0)'
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Verify tag matches package.json
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag (v$TAG_VERSION)"
            echo "Bump package.json, commit, then tag v$PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - name: Build mac
        if: matrix.platform == 'mac'
        run: pnpm run build:mac:ci

      - name: Build linux
        if: matrix.platform == 'linux'
        run: pnpm run build:linux

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ matrix.platform }}" = "mac" ]; then
            cp dist/*.dmg release-assets/
          else
            cp dist/*.AppImage release-assets/
          fi
          ls -la release-assets/
          test "$(ls -A release-assets)"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Meetify v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.AppImage
